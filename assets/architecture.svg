<svg width="800" height="560" viewBox="0 0 800 560" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="560" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a2e">VibeFinder 2.0 — System Architecture</text>
  <text x="400" y="52" text-anchor="middle" font-size="11" fill="#666">Extended from VibeFinder 1.0 (Module 3) — new layers shown with dashed borders</text>

  <!-- Arrow marker defs -->
  <defs>
    <marker id="a0" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="a1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1a73c8" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="a3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#388e3c" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- ── ROW 1: User ── -->
  <rect x="330" y="72" width="140" height="46" rx="8" fill="#e8e8f0" stroke="#9b9bbf" stroke-width="1.2"/>
  <text x="400" y="91" text-anchor="middle" font-size="12" font-weight="700" fill="#3c3c6e">👤 User</text>
  <text x="400" y="108" text-anchor="middle" font-size="10" fill="#5a5a8a">Natural language input</text>

  <!-- User → Guardrail -->
  <line x1="400" y1="118" x2="400" y2="142" stroke="#555" stroke-width="1.5" marker-end="url(#a0)"/>

  <!-- ── ROW 2: Guardrail (NEW) ── -->
  <rect x="240" y="144" width="320" height="52" rx="8" fill="#fff3cd" stroke="#d4a017" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="310" y="162" text-anchor="middle" font-size="10" fill="#999" font-style="italic">NEW in v2.0</text>
  <text x="400" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#7a5800">🛡 Guardrail Layer</text>
  <text x="400" y="179" text-anchor="middle" font-size="10" fill="#9a6f00">Blocks prompt injections / role overrides (keyword matching)</text>

  <!-- Guardrail blocked → left -->
  <line x1="240" y1="170" x2="170" y2="170" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#a1)"/>
  <rect x="50" y="154" width="118" height="32" rx="6" fill="#fde8e8" stroke="#c0392b" stroke-width="1"/>
  <text x="109" y="174" text-anchor="middle" font-size="10" fill="#922b21">⚠ Blocked reply</text>

  <!-- Guardrail → AI Parser -->
  <line x1="400" y1="196" x2="400" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#a0)"/>
  <text x="414" y="212" font-size="9" fill="#666">clean input</text>

  <!-- ── ROW 3: AI Parser (NEW) ── -->
  <rect x="240" y="222" width="320" height="52" rx="8" fill="#dceefb" stroke="#1a73c8" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="310" y="240" text-anchor="middle" font-size="10" fill="#999" font-style="italic">NEW in v2.0</text>
  <text x="400" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#0d47a1">🤖 AI Preference Parser</text>
  <text x="400" y="257" text-anchor="middle" font-size="10" fill="#1a5276">Anthropic API — extracts genre, mood, energy + self-confidence score</text>

  <!-- AI Parser → Recommender -->
  <line x1="400" y1="274" x2="400" y2="298" stroke="#555" stroke-width="1.5" marker-end="url(#a0)"/>
  <text x="414" y="290" font-size="9" fill="#666">structured prefs</text>

  <!-- ── ROW 4: Recommender (ORIGINAL) ── -->
  <rect x="240" y="300" width="320" height="52" rx="8" fill="#e8e8f0" stroke="#9b9bbf" stroke-width="1.2"/>
  <text x="400" y="318" text-anchor="middle" font-size="12" font-weight="700" fill="#3c3c6e">🎵 Recommender Engine</text>
  <text x="400" y="335" text-anchor="middle" font-size="10" fill="#5a5a8a">Original VibeFinder 1.0 — score_song() + recommend_songs() + scoring modes</text>

  <!-- songs.csv feeds recommender -->
  <rect x="50" y="310" width="100" height="32" rx="6" fill="#f0f4ff" stroke="#7986cb" stroke-width="1"/>
  <text x="100" y="330" text-anchor="middle" font-size="10" fill="#3949ab">📄 songs.csv</text>
  <line x1="150" y1="326" x2="238" y2="326" stroke="#7986cb" stroke-width="1.2" marker-end="url(#a0)"/>

  <!-- Recommender → Evaluator -->
  <line x1="400" y1="352" x2="400" y2="376" stroke="#555" stroke-width="1.5" marker-end="url(#a0)"/>
  <text x="414" y="368" font-size="9" fill="#666">ranked recs</text>

  <!-- ── ROW 5: Evaluator (NEW) ── -->
  <rect x="240" y="378" width="320" height="52" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="310" y="396" text-anchor="middle" font-size="10" fill="#999" font-style="italic">NEW in v2.0</text>
  <text x="400" y="396" text-anchor="middle" font-size="12" font-weight="700" fill="#1b5e20">📊 Evaluator</text>
  <text x="400" y="413" text-anchor="middle" font-size="10" fill="#2e7d32">Genre/mood match rate + avg score → quality_score (0.0–1.0)</text>

  <!-- Evaluator → Display -->
  <line x1="400" y1="430" x2="400" y2="454" stroke="#555" stroke-width="1.5" marker-end="url(#a0)"/>

  <!-- ── ROW 6: Display ── -->
  <rect x="240" y="456" width="200" height="46" rx="8" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.2"/>
  <text x="340" y="475" text-anchor="middle" font-size="12" font-weight="700" fill="#4a148c">🖥 User Display</text>
  <text x="340" y="492" text-anchor="middle" font-size="10" fill="#6a1b9a">Reply + confidence bar + summary</text>

  <!-- Logger -->
  <rect x="490" y="456" width="110" height="46" rx="8" fill="#fff8e1" stroke="#f9a825" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="545" y="475" text-anchor="middle" font-size="11" font-weight="700" fill="#e65100">📋 Logger</text>
  <text x="545" y="492" text-anchor="middle" font-size="9" fill="#e65100">logs/session_DATE</text>
  <line x1="490" y1="479" x2="442" y2="479" stroke="#f9a825" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#a0)"/>

  <!-- Test harness box -->
  <rect x="50" y="430" width="160" height="68" rx="8" fill="#fafafa" stroke="#aaa" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="130" y="450" text-anchor="middle" font-size="10" font-weight="700" fill="#444">🧪 Test Harness</text>
  <text x="130" y="465" text-anchor="middle" font-size="9" fill="#666">tests/test_harness.py</text>
  <text x="130" y="479" text-anchor="middle" font-size="9" fill="#666">8 test cases</text>
  <text x="130" y="493" text-anchor="middle" font-size="9" fill="#666">Pass/Fail report</text>
  <line x1="210" y1="464" x2="238" y2="408" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#a0)"/>

  <!-- Legend -->
  <rect x="50" y="516" width="700" height="32" rx="6" fill="#f0f0f0" stroke="#ccc" stroke-width="0.8"/>
  <rect x="68" y="528" width="14" height="10" rx="2" fill="#e8e8f0" stroke="#9b9bbf" stroke-width="1"/>
  <text x="88" y="537" font-size="10" fill="#444">Original (v1.0)</text>
  <rect x="170" y="528" width="14" height="10" rx="2" fill="#dceefb" stroke="#1a73c8" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="190" y="537" font-size="10" fill="#444">New in v2.0</text>
  <line x1="280" y1="533" x2="305" y2="533" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="310" y="537" font-size="10" fill="#444">Blocked path</text>
  <line x1="400" y1="533" x2="425" y2="533" stroke="#f9a825" stroke-width="1.2" stroke-dasharray="4 2"/>
  <text x="430" y="537" font-size="10" fill="#444">Async logging</text>
  <line x1="520" y1="533" x2="545" y2="533" stroke="#aaa" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="550" y="537" font-size="10" fill="#444">Testing path</text>
</svg>
